name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle Wrapper
        run: |
          cd $GITHUB_WORKSPACE/src
          mkdir -p gradle/wrapper
          curl -fsSL "https://raw.githubusercontent.com/phisher98/cloudstream-extensions-phisher/master/gradlew" -o gradlew
          curl -fsSL "https://raw.githubusercontent.com/phisher98/cloudstream-extensions-phisher/master/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.13-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties

      - name: Build plugin dan generate plugins.json
        run: |
          cd $GITHUB_WORKSPACE/src
          ./gradlew IdlixKu:make makePluginsJson --no-daemon
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Copy hasil build ke builds branch
        run: |
          rm -f $GITHUB_WORKSPACE/builds/*.cs3
          find $GITHUB_WORKSPACE/src -name "*.cs3" -exec cp {} $GITHUB_WORKSPACE/builds/ \;
          cp $GITHUB_WORKSPACE/src/build/plugins.json $GITHUB_WORKSPACE/builds/plugins.json
          echo "=== plugins.json ==="
          cat $GITHUB_WORKSPACE/builds/plugins.json
          echo "=== file cs3 ==="
          ls -lh $GITHUB_WORKSPACE/builds/*.cs3

      - name: Buat repo.json
        run: |
          cat > $GITHUB_WORKSPACE/builds/repo.json << REPOEOF
          {
            "name": "IdlixKu Repository",
            "description": "Film dan Serial subtitle Indonesia dari idlixku.com",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/${{ github.repository }}/builds/plugins.json"
            ]
          }
          REPOEOF
          echo "=== repo.json ==="
          cat $GITHUB_WORKSPACE/builds/repo.json

      - name: Push ke branch builds
        run: |
          cd ${{ github.workspace }}/builds
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet && echo "Tidak ada perubahan" && exit 0
          git commit -m "Build ${{ github.sha }}"
          git push origin builds
